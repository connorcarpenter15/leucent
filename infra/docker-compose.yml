name: bleucent

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: bleucent
      POSTGRES_PASSWORD: bleucent
      POSTGRES_DB: bleucent
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U bleucent -d bleucent']
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: bleucent
      MINIO_ROOT_PASSWORD: bleucentminio
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 5s
      timeout: 3s
      retries: 20

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 bleucent bleucentminio &&
      (mc mb local/bleucent-replays || true) &&
      mc anonymous set download local/bleucent-replays
      "

  dind:
    image: docker:27-dind
    restart: unless-stopped
    privileged: true
    environment:
      DOCKER_TLS_CERTDIR: ''
    command: ['dockerd', '--host=tcp://0.0.0.0:2375', '--tls=false']
    ports:
      - '2375:2375'
    volumes:
      - dind_data:/var/lib/docker

volumes:
  postgres_data:
  minio_data:
  dind_data:
